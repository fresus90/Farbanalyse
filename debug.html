<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farbanalyse — Debug & Kalibrierung</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0c12; color:#c8d0d8; font-family:'DM Sans',sans-serif; min-height:100vh; padding:20px 16px 60px; }
  .debug-header { max-width:960px; margin:0 auto 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .debug-header h1 { font-family:'Playfair Display',serif; font-size:1.3rem; color:#d4cfc9; }
  .tag { font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:#e8a040; background:rgba(232,160,64,.1); border:1px solid rgba(232,160,64,.25); border-radius:20px; padding:3px 10px; }
  .upload-area { max-width:960px; margin:0 auto 16px; border:2px dashed #2a3a4a; border-radius:12px; padding:24px; text-align:center; cursor:pointer; transition:all .2s; }
  .upload-area:hover,.upload-area.drag-over { border-color:#4a7fa5; background:rgba(74,127,165,.05); }
  .upload-area .icon { font-size:1.6rem; color:#3a5a78; margin-bottom:6px; }
  .upload-area .text { font-size:.8rem; color:#6a8a9a; }
  .upload-area .sub { font-size:.6rem; color:#3a5a6a; margin-top:3px; }
  .upload-area input { display:none; }
  #status { max-width:960px; margin:0 auto 14px; font-size:.7rem; color:#5a7a8a; letter-spacing:.04em; min-height:18px; }
  #status.loading { color:#4a7fa5; } #status.error { color:#c07878; } #status.success { color:#6aaa7a; }
  .grid { max-width:960px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:680px) { .grid { grid-template-columns:1fr; } }
  .panel { background:#12161e; border:1px solid #1e2a38; border-radius:10px; overflow:hidden; }
  .ph { padding:9px 14px; border-bottom:1px solid #1a2230; font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:#4a7fa5; background:#0e1218; }
  .pb { padding:12px 14px; }
  .full { grid-column:1/-1; }
  .mr { display:flex; align-items:center; justify-content:space-between; padding:5px 0; border-bottom:1px solid #1a2230; }
  .mr:last-child { border-bottom:none; }
  .ml { font-size:.66rem; color:#6a8a9a; display:flex; align-items:center; gap:5px; }
  .ml .h { font-size:.52rem; color:#3a5a6a; }
  .mv { font-family:'JetBrains Mono',monospace; font-size:.74rem; color:#c8d8e4; font-weight:500; }
  .mv.warm { color:#e8a860; } .mv.cool { color:#7ab0cc; } .mv.soft { color:#a0a8b8; }
  .swatch-row { display:flex; align-items:center; gap:10px; padding:8px 0; }
  .swatch-circle { width:40px; height:40px; border-radius:50%; border:2px solid #2a3a4a; flex-shrink:0; }
  .swatch-info { font-family:'JetBrains Mono',monospace; font-size:.64rem; color:#8a9eaa; line-height:1.5; }
  .swatch-label { font-size:.56rem; color:#4a6a7a; letter-spacing:.1em; text-transform:uppercase; margin-bottom:2px; }
  .si { padding:6px 0; border-bottom:1px solid #1a2230; }
  .si:last-child { border-bottom:none; }
  .st { display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
  .sn { font-size:.66rem; color:#8a9eaa; }
  .sn .rk { display:inline-block; width:18px; height:18px; line-height:18px; text-align:center; border-radius:50%; font-size:.5rem; font-weight:600; margin-right:5px; }
  .rk.g { background:#4a7fa5; color:#fff; } .rk.s { background:#2a3a4a; color:#8a9eaa; }
  .sp { font-family:'JetBrains Mono',monospace; font-size:.66rem; color:#c8d8e4; }
  .sb { height:4px; background:#1a2230; border-radius:2px; overflow:hidden; }
  .sf { height:100%; border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }
  .sf.t { background:linear-gradient(90deg,#4a7fa5,#7ab8d4); } .sf.r { background:#2a4a5a; }
  .fits { display:flex; gap:6px; margin-top:2px; flex-wrap:wrap; }
  .fit { font-size:.48rem; color:#4a6a7a; letter-spacing:.03em; }
  .cb { display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border-radius:8px; font-size:.68rem; font-weight:500; margin-top:8px; }
  .cb.hi { background:rgba(106,170,122,.15); color:#6aaa7a; border:1px solid rgba(106,170,122,.3); }
  .cb.md { background:rgba(232,160,64,.12); color:#e8a040; border:1px solid rgba(232,160,64,.25); }
  .cb.lo { background:rgba(192,120,120,.12); color:#c07878; border:1px solid rgba(192,120,120,.25); }
  .empty { text-align:center; padding:30px 16px; color:#3a5a6a; font-size:.7rem; }
  .trio { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  @media(max-width:680px) { .trio { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="debug-header">
  <h1>🔬 Erscheinungsbild-Analyse Debug</h1>
  <span class="tag">v2 — Haut + Haar + Iris</span>
</div>

<div class="upload-area" id="uploadArea">
  <div class="icon">＋</div>
  <div class="text">Foto laden zum Analysieren</div>
  <div class="sub">JPG oder PNG · Klicken oder ziehen</div>
  <input type="file" id="fileInput" accept="image/*">
</div>
<div id="status"></div>

<div id="results" style="display:none;">
  <!-- Bild + Regionen -->
  <div class="grid" style="margin-bottom:14px;">
    <div class="panel">
      <div class="ph">Foto + Sampling-Regionen</div>
      <div class="pb"><canvas id="debugCanvas" style="width:100%;border-radius:6px;display:block;"></canvas></div>
    </div>
    <div class="panel">
      <div class="ph">Features (6 Dimensionen)</div>
      <div class="pb" id="featuresPanel"><div class="empty">…</div></div>
    </div>
  </div>

  <!-- Haut / Haar / Iris Swatches -->
  <div class="trio" style="margin-bottom:14px;">
    <div class="panel"><div class="ph">🎨 Haut</div><div class="pb" id="skinPanel"><div class="empty">…</div></div></div>
    <div class="panel"><div class="ph">💇 Haar</div><div class="pb" id="hairPanel"><div class="empty">…</div></div></div>
    <div class="panel"><div class="ph">👁 Iris</div><div class="pb" id="irisPanel"><div class="empty">…</div></div></div>
  </div>

  <!-- Scores -->
  <div class="grid">
    <div class="panel full">
      <div class="ph">Farbtyp-Scores (Top 6)</div>
      <div class="pb" id="scoresPanel"><div class="empty">…</div></div>
    </div>
  </div>
</div>

<img id="sourceImg" style="display:none;">

<script type="module">
import { analyzeSkin, initSkinAnalysis, debugDrawRegions, labToRgb } from './src/modules/skinAnalysis.js';

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');
const results = document.getElementById('results');
const sourceImg = document.getElementById('sourceImg');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f?.type.startsWith('image/')) processFile(f); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) processFile(fileInput.files[0]); });

function setStatus(msg, type = '') { status.textContent = msg; status.className = type; }

async function processFile(file) {
  setStatus('⏳ Bild wird geladen…', 'loading');
  results.style.display = 'none';
  const reader = new FileReader();
  reader.onload = e => { sourceImg.src = e.target.result; sourceImg.onload = () => runAnalysis(); };
  reader.readAsDataURL(file);
}

async function runAnalysis() {
  try {
    setStatus('⏳ MediaPipe laden…', 'loading');
    await initSkinAnalysis();
    setStatus('⏳ Haut + Haar + Iris analysieren…', 'loading');
    const r = await analyzeSkin(sourceImg);
    if (!r.success) { setStatus('✗ ' + r.error, 'error'); return; }

    setStatus(`✓ ${r.skin.pixelCount} Haut / ${r.hair.pixelCount} Haar / ${r.iris.pixelCount} Iris px — Top: ${r.scores[0].name}`, 'success');
    results.style.display = 'block';

    debugDrawRegions(sourceImg, document.getElementById('debugCanvas'));
    renderFeatures(r.features);
    renderRegion('skinPanel', 'Haut', r.skin);
    renderRegion('hairPanel', 'Haar', r.hair);
    renderRegion('irisPanel', 'Iris', r.iris);
    renderScores(r.scores, r.topConfidence);
  } catch (err) { setStatus('✗ ' + err.message, 'error'); console.error(err); }
}

function renderFeatures(f) {
  const warmClass = f.overallWarmth > 0.55 ? 'warm' : f.overallWarmth < 0.38 ? 'cool' : 'soft';
  const warmLabel = f.overallWarmth > 0.55 ? '→ warm' : f.overallWarmth < 0.38 ? '→ kühl' : '→ neutral';
  document.getElementById('featuresPanel').innerHTML = `
    <div class="mr"><span class="ml">Haut ITA <span class="h">(Helligkeit)</span></span><span class="mv">${f.skinIta.toFixed(1)}° → ${fmtIta(f.skinItaCategory)}</span></div>
    <div class="mr"><span class="ml">Haut Hue <span class="h">(Farbton)</span></span><span class="mv ${f.skinHue > 60 ? 'warm' : f.skinHue < 48 ? 'cool' : ''}">${f.skinHue.toFixed(1)}°</span></div>
    <div class="mr"><span class="ml">Haar L* <span class="h">(Helligkeit)</span></span><span class="mv">${f.hairDepth.toFixed(1)} ${f.hairDepth > 60 ? '→ hell' : f.hairDepth < 30 ? '→ dunkel' : '→ mittel'}</span></div>
    <div class="mr"><span class="ml">Haar Wärme <span class="h">(golden↔asch)</span></span><span class="mv ${f.hairWarmth > 0.5 ? 'warm' : 'cool'}">${(f.hairWarmth * 100).toFixed(0)}% ${f.hairWarmth > 0.5 ? '→ golden' : '→ asch'}</span></div>
    <div class="mr"><span class="ml">Kontrast <span class="h">(Haut↔Haar ΔE)</span></span><span class="mv">${f.skinHairContrast.toFixed(1)} ${f.skinHairContrast > 35 ? '→ hoch' : f.skinHairContrast < 18 ? '→ gering' : '→ mittel'}</span></div>
    <div class="mr"><span class="ml">Gesamt-Wärme <span class="h">(40% Haut 35% Haar 25% Iris)</span></span><span class="mv ${warmClass}">${(f.overallWarmth * 100).toFixed(0)}% ${warmLabel}</span></div>
  `;
}

function fmtIta(c) { return { very_light:'Sehr hell', light:'Hell', intermediate:'Mittel', tan:'Gebräunt', brown:'Braun', dark:'Dunkel' }[c] || c; }

function renderRegion(panelId, label, data) {
  const el = document.getElementById(panelId);
  if (!data.lab) { el.innerHTML = `<div class="empty">Kein ${label} erkannt (${data.pixelCount} px)</div>`; return; }
  const rgb = data.rgb;
  const hex = '#' + [rgb.r, rgb.g, rgb.b].map(v => v.toString(16).padStart(2, '0')).join('');
  el.innerHTML = `
    <div class="swatch-row">
      <div class="swatch-circle" style="background:${hex}"></div>
      <div>
        <div class="swatch-label">${label} · ${data.pixelCount} px</div>
        <div class="swatch-info">
          L*=${data.lab.L.toFixed(1)} a*=${data.lab.a.toFixed(1)} b*=${data.lab.b.toFixed(1)}<br>
          ${hex}
        </div>
      </div>
    </div>
  `;
}

function renderScores(scores, confidence) {
  const top = scores.slice(0, 6);
  let html = top.map((s, i) => `
    <div class="si">
      <div class="st">
        <span class="sn"><span class="rk ${i === 0 ? 'g' : 's'}">${i + 1}</span>${s.name} <span style="color:#3a5a6a;font-size:.54rem;">(${s.season})</span></span>
        <span class="sp">${s.pct || 0}%</span>
      </div>
      <div class="sb"><div class="sf ${i === 0 ? 't' : 'r'}" style="width:${s.pct || 0}%"></div></div>
      <div class="fits">
        <span class="fit">ITA:${s.fits.skinIta}%</span>
        <span class="fit">Hue:${s.fits.skinHue}%</span>
        <span class="fit">HaarL:${s.fits.hairDepth}%</span>
        <span class="fit">HaarW:${s.fits.hairWarm}%</span>
        <span class="fit">Kontr:${s.fits.contrast}%</span>
        <span class="fit">Wärme:${s.fits.warmth}%</span>
      </div>
    </div>
  `).join('');
  const cc = confidence > 15 ? 'hi' : confidence > 8 ? 'md' : 'lo';
  const cl = confidence > 15 ? 'Hohe Sicherheit' : confidence > 8 ? 'Mittlere Sicherheit' : 'Geringe Sicherheit — Quiz empfohlen';
  html += `<div class="cb ${cc}">Confidence: ${confidence}% — ${cl}</div>`;
  document.getElementById('scoresPanel').innerHTML = html;
}
</script>
</body>
</html>
